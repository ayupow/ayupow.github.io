<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Academic Webpage" />
    <meta name="author" content="senli1073" />
    <title id="title"></title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap"
        rel="stylesheet" />

    <!-- Core theme CSS includes Bootstrap -->
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- For Compatibility -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError:
                    (jax, err) => jax.formatError(err)
            }
        };
    </script>

    <!-- MathJax -->
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

    <!-- Custom Styles -->
    <style>
        /* =========================
           Global polish
           ========================= */

        :root {
            --nav-height: 72px;
            --primary-blue: #0d6efd;
            --soft-gray: #f4f6f8;
            --dark-text: #222;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: var(--nav-height);
        }

        body {
            background-color: var(--soft-gray);
            color: var(--dark-text);
            line-height: 1.7;
            font-feature-settings: "kern";
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        section {
            padding-top: 4.5rem;
            padding-bottom: 4.5rem;
        }

        .bg-gradient-primary-to-secondary-light {
            background: #ffffff !important;
        }

        .bg-gradient-primary-to-secondary-gray {
            background: var(--soft-gray) !important;
        }

        .container {
            max-width: 1180px;
        }

        .main-body {
            font-size: 1.02rem;
            color: #2b2b2b;
        }

        .main-body p {
            margin-bottom: 1rem;
        }

        .main-body a {
            color: var(--primary-blue);
            text-decoration: none;
            border-bottom: 1px solid rgba(13, 110, 253, 0.25);
            transition: all 0.2s ease;
        }

        .main-body a:hover {
            color: #084298;
            border-bottom-color: #084298;
        }

        .publication-motto {
            font-size: 1.15rem;
            font-style: italic;
            color: #555;
            max-width: 900px;
            margin-top: -0.6rem;
            margin-bottom: 2rem;
            padding-left: 1rem;
            border-left: 4px solid var(--primary-blue);
            line-height: 1.8;
        }

        section header h2 {
            font-weight: 700;
            letter-spacing: 0.03em;
            margin-bottom: 1.8rem;
            color: #222;
        }

        section header h2 i {
            margin-right: 0.35rem;
            color: var(--primary-blue);
        }

        /* =========================
           Navigation polish
           ========================= */

        #mainNav {
            min-height: var(--nav-height);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.94) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            z-index: 1030;
        }

        .navbar-brand,
        .nav-link {
            letter-spacing: 0.04em;
        }

        .navbar-brand {
            font-weight: 800;
        }

        .nav-link {
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: var(--primary-blue) !important;
        }

       /* =========================
           Top section polish (终极修复版)
           ========================= */

        .hero-section {
            position: relative;
            width: 100%;
            min-height: 45vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            background: #2b2b2b;
        }

        .hero-image {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;     /* 👈 核心：强制图片高度100% */
            object-fit: cover !important;  /* 👈 核心：强制图片智能裁切填满整个区域 */
            object-position: center !important;
            z-index: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        
        .hero-section::after {
            content: '';
            position: absolute !important;
            inset: 0 !important;
            z-index: 1 !important;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.6)) !important;
            pointer-events: none;
        }

        .top-section-content {
            position: relative !important;
            z-index: 2 !important;
            width: 100%;
            padding: 100px 15px; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #top-section-bg-text {
            position: relative !important;
            max-width: 1000px;
            margin: 0 auto !important;
            font-weight: 800;
            letter-spacing: 0.02em;
            line-height: 1.3 !important;
            color: #ffffff !important;
            text-shadow: 0 5px 24px rgba(0, 0, 0, 0.6);
            transform: none !important;
        }

        /* =========================
           Avatar polish
           ========================= */

        #avatar {
    position: relative;
    z-index: 5;
    margin-top: 28px;
    margin-bottom: 1.5rem;
        }

        #avatar img {
            display: block;
            border-radius: 18px;
            border: 4px solid #ffffff;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        #avatar img:hover {
            transform: translateY(-3px);
            box-shadow: 0 1rem 2.5rem rgba(0, 0, 0, 0.18) !important;
        }

        /* =========================
           Section content polish
           ========================= */

        #home .main-body,
        #awards .main-body,
        #publications .main-body {
            max-width: 1100px;
        }

        #home {
            padding-top: 3.5rem;
        }

        #home .main-body,
        #awards .main-body {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 18px;
            padding: 1.6rem 1.8rem;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.045);
        }

        #publications .main-body > * {
            margin-bottom: 1.2rem;
        }

        #publications .main-body strong {
            color: #111;
        }

        /* =========================
           Publications image layout
           ========================= */

        .pub-images-box {
            display: flex;
            flex-wrap: nowrap;
            gap: 14px;
            width: 100%;
            margin-top: 18px;
            margin-bottom: 30px;
            align-items: stretch;
        }

        .pub-images-box img {
            flex: 1 1 0;
            min-width: 0;
            width: calc((100% - 28px) / 3);
            height: clamp(250px, 21vw, 320px);
            object-fit: contain;
            background: #ffffff;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .pub-images-box img:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.14);
            border-color: rgba(13, 110, 253, 0.28);
        }

        /* =========================
           Footer polish
           ========================= */

        footer {
            background: linear-gradient(135deg, #1f2937, #111827) !important;
        }

        footer a {
            color: rgba(255, 255, 255, 0.72);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: #ffffff;
        }

        /* =========================
           Responsive design
           ========================= */

        @media (max-width: 900px) {
            :root {
                --nav-height: 66px;
            }

            .pub-images-box {
                flex-wrap: wrap;
            }

            .pub-images-box img {
                flex: 1 1 calc(50% - 14px);
                width: calc(50% - 14px);
                height: 240px;
            }

            #top-section-bg-text {
                font-size: 2.2rem;
                padding-left: 1rem;
                padding-right: 1rem;
            }

            #avatar {
                margin-top: 24px;
            }
        }

        @media (max-width: 600px) {
            :root {
                --nav-height: 64px;
            }

            .hero-section {
                min-height: 320px; 
            }
            .top-section-content {
                padding: 90px 15px 70px 15px;
            }
            #top-section-bg-text {
                font-size: 1.55rem; /* 字体稍微缩一点，防止换行太多 */
                line-height: 1.35 !important;
            }

            section {
                padding-top: 3rem;
                padding-bottom: 3rem;
            }

            .container {
                padding-left: 1.25rem !important;
                padding-right: 1.25rem !important;
            }

            #top-section-bg-text {
                font-size: 1.45rem;
                line-height: 1.25;
            }

            #avatar {
    margin-top: 20px;
    margin-bottom: 1rem;
}

            #home {
                padding-top: 2.5rem;
            }

            #home .main-body,
            #awards .main-body {
                padding: 1.25rem;
                border-radius: 14px;
            }

            .publication-motto {
                font-size: 1.02rem;
                margin-bottom: 1.6rem;
            }

            .pub-images-box {
                flex-direction: column;
                gap: 12px;
            }

            .pub-images-box img {
                width: 100%;
                height: auto;
                max-height: none;
            }

            section header h2 {
                font-size: 1.55rem;
            }
        }
    </style>

</head>

    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a id="page-top-title" class="navbar-brand fw-bold" href="#page-top"></a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"

                    <li class="nav-item">

                    </li>
                </ul>

    <!-- Top Section -->
<section class="top-section hero-section">
    <img class="hero-image" src="static/assets/img/background.jpeg" alt="Background image">
    <div class="top-section-content">

</section>
<!-- Top Section -->

    <!-- Photo -->
    <div class="container px-5">
        <div id="avatar">
            <img class="shadow" src="static/assets/img/photo.png" alt="Profile photo">
        </div>
    </div>
    <!-- Photo -->

    <!-- Home -->
    <section class="bg-gradient-primary-to-secondary-gray mt5 md5" id="home">
        <div class="container px-5">
            <header>
                <h2 id="home-subtitle"></h2>
            </header>
            <div class="main-body" id="home-md"></div>
        </div>
    </section>
    <!-- Home -->

    <!-- Publications -->
    <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="publications">
        <div class="container px-5">
            <header>
                <h2 id="publications-subtitle">
                    <i class="bi bi-file-text-fill"></i>&nbsp;PUBLICATIONS
                </h2>
            </header>

            <p class="publication-motto">
                I pursue research guided by my ISO (Industry-oriented, Solid, and Open) principle.
            </p>

            <div class="main-body" id="publications-md"></div>
        </div>
    </section>
    <!-- Publications -->

    <!-- Awards -->
    <section class="bg-gradient-primary-to-secondary-gray mt5 md5" id="awards">
        <div class="container px-5">
            <header>
                <h2 id="awards-subtitle">
                    <i class="bi bi-award-fill"></i>&nbsp;AWARDS
                </h2>
            </header>
            <div class="main-body" id="awards-md"></div>
        </div>
    </section>
    <!-- Awards -->

    <!-- Footer-->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
                <a id="github-link" href="https://github.com/senli1073">Github</a>
                <span class="mx-1">&middot;</span>
                <a id="license-link" href="https://github.com/senli1073/senli1073.github.io/blob/main/LICENSE">License</a>
            </div>
        </div>
    </footer>

    <!-- Automatically open external links in a new tab -->
    <script>
        document.addEventListener('click', function (e) {
            const target = e.target.closest('a');

            if (target && target.href) {
                const href = target.getAttribute('href');

                if (href && !href.startsWith('#')) {
                    target.setAttribute('target', '_blank');
                    target.setAttribute('rel', 'noopener noreferrer');
                }
            }
        });
    </script>

</body>

</html>
